<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iRock - The Rock Virtual Friend</title>
    <style>
      div {
        height: 300px;
        margin-top: 100px;
        text-align: center;
      }

      img {
        width: 250px;
      }
    </style>
  </head>
  <body onload="theRockSaysHi()">
    <div>
      <img
        id="theRock"
        src="the_rock_serious.png"
        alt="Picture of iRock"
        onclick="touchTheRock()"
        style="cursor: pointer"
      />
    </div>

    <script>
      function theRockSaysHi() {
        alert("Hello fokes, I am your friend, The Rock!");
      }

      function touchTheRock() {
        let userName = prompt("Whats your name bro/sis?");

        if (userName) {
          alert(
            "It's absolutely awesome to meet you " + userName + ". Respect!",
          );
          document.getElementById("theRock").src = "the_rock_grind.png";
        }
      }
    </script>
  </body>
</html>
